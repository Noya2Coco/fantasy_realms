<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Battle Game</title>
    <link rel="stylesheet" href="/css/style.css">
    <script type="module" src="/js/client.js"></script>
</head>

<body>
    <svg width="0" height="0">
        <defs>
            <clipPath id="heartClipPath">
                <path d="M10,30
                         C20,10 40,10 50,30
                         C60,50 40,70 30,90
                         C20,70 0,50 10,30 Z" />
            </clipPath>
        </defs>
    </svg>
    <div id="healthBarContainer">
        <div id="recentDamageBar"></div>
        <div id="healthBar"></div>
    </div>
    <img id="healthHeart" src="/images/heart.png" alt="Heart">
    <canvas id="renderCanvas"></canvas>
    <div id="infoPanel">
        <div id="player-positions-infos">
            <h3>Player's Positions</h3>
            <p id="coordinates">Coordinates: (0, 0, 0)</p>
            <p id="orientation">Orientation: (0, 0, 0)</p>
            <p id="ship-forces">Forces: (0, 0, 0)</p>
        </div>
        <div id="number-of-objects">
            <h3>Number of Objects</h3>
            <p id="number-of-ships">Ships: 0</p>
            <p id="number-of-bullets">Bullets: 0</p>
            <p id="number-of-planets">Planets: 0</p>
            <p id="number-of-particles">Particles: 0</p>
        </div>
    </div>
    <div id="fpsPanel">
        <p id="fps">FPS: 0</p>
        <canvas id="fpsCanvas" width="150" height="75"></canvas>
    </div>
    <div id="axesIndicator">
        <canvas id="axesCanvas" width="100" height="100"></canvas>
    </div>
    <div id="gravityWarning"></div>
    <form id="usernameForm">
        <label for="username">Enter your username:</label>
        <input type="text" id="username" name="username">
        <button type="submit">Join Game</button>
    </form>
    <div id="radarContainer">
        <canvas id="radarCanvas" width="200" height="200"></canvas>
    </div>
</body>
</html>
