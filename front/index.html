<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Battle Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="infoPanel">
        <p id="coordinates">Coordinates: (0, 0, 0)</p>
        <p id="orientation">Orientation: (0, 0, 0)</p>
        <p id="ship-forces">Ship Forces: (0, 0, 0)</p>
        <p id="planet-forces">Planet Forces: (0, 0, 0)</p>
    </div>
    <div id="fpsPanel">
        <p id="fps">FPS: 0</p>
        <canvas id="fpsCanvas" width="150" height="75"></canvas>
    </div>
    <div id="axisIndicator">
        <canvas id="axisCanvas" width="100" height="100"></canvas>
    </div>
    <div id="gravityWarning"></div>
    <form id="usernameForm">
        <label for="username">Enter your username:</label>
        <input type="text" id="username" name="username">
        <button type="submit">Join Game</button>
    </form>
    <script src="js/client.js"></script>
</body>
</html>
