<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Battle Game</title>
    <link rel="stylesheet" href="/src/css/style.css">
    <style>
        #infoPanel, #fpsPanel, #axisIndicator {
            display: none; /* Hide by default */
        }
        #gravityWarning {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: none; /* Hide by default */
            pointer-events: none; /* Allow clicks to pass through */
            background: radial-gradient(circle, rgba(255, 0, 0, 0) 50%, rgba(255, 0, 0, 1) 100%);
            animation: blink 1s infinite; /* Add blink animation */
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="infoPanel">
        <p id="coordinates">Coordinates: (0, 0, 0)</p>
        <p id="orientation">Orientation: (0, 0, 0)</p>
        <p id="ship-forces">Ship Forces: (0, 0, 0)</p>
        <p id="planet-forces">Planet Forces: (0, 0, 0)</p>
    </div>
    <div id="fpsPanel">
        <p id="fps">FPS: 0</p>
        <canvas id="fpsCanvas" width="150" height="75"></canvas>
    </div>
    <div id="axisIndicator">
        <canvas id="axisCanvas" width="100" height="100"></canvas>
    </div>
    <div id="gravityWarning"></div>
    <script type="module" src="/src/js/main.js"></script>
</body>
</html>
